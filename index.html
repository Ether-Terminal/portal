<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ether Sovereign OS — Secure Settlement Bridge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    
    <!-- Plaid Link -->
    <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
    
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #070709;
            --surface:   #0e0f12;
            --border:    #1c1f26;
            --cyan:      #00f0ff;
            --emerald:   #10b981;
            --red:       #ef4444;
            --text:      #cbd5e1;
            --muted:     #475569;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background-image:
                linear-gradient(to right, rgba(0,240,255,0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0,240,255,0.03) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        .panel {
            width: 100%;
            max-width: 440px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 0 40px rgba(0,240,255,0.06), 0 20px 60px rgba(0,0,0,0.6);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .header h1 {
            color: var(--emerald);
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .badge {
            font-size: 9px;
            background: rgba(16,185,129,0.1);
            color: var(--emerald);
            border: 1px solid rgba(16,185,129,0.3);
            padding: 3px 8px;
            border-radius: 4px;
            letter-spacing: 0.15em;
        }

        .machine-line {
            font-size: 10px;
            color: var(--muted);
            margin-bottom: 28px;
            margin-top: 4px;
        }

        .machine-line span {
            color: var(--emerald);
            font-weight: 700;
        }

        .btn {
            width: 100%;
            margin-top: 24px;
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.2em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-pay {
            background: var(--emerald);
            color: #000;
        }

        .btn-pay:hover { background: #34d399; }
        .btn-pay:disabled { background: #1c3a2f; color: var(--muted); cursor: not-allowed; }

        .status-bar {
            margin-top: 20px;
            font-size: 10px;
            color: var(--muted);
            text-align: center;
            letter-spacing: 0.1em;
            line-height: 1.5;
        }

        .status-bar.error { color: var(--red); }
        .status-bar.ok    { color: var(--emerald); }

        #payment-panel {
            min-height: 200px;
            margin-bottom: 12px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(0,0,0,0.3);
            border-radius: 50%;
            border-top-color: #000;
            animation: spin 1s ease-in-out infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
    </style>
</head>
<body>

<div class="panel">
    <div class="header">
        <h1 id="pkg-title">ETHAN SETTLEMENT</h1>
        <span class="badge" id="pkg-badge">STRIPE BRIDGE</span>
    </div>
    <p class="machine-line">
        Coverage: <span id="display-package" style="color:var(--emerald); font-weight:700;">—</span>
        &nbsp;·&nbsp; Machine: <span id="display-machine-id">DETECTING...</span>
    </p>

    <!-- Plaid Integration -->
    <div id="payment-panel" style="text-align: center; padding-top: 20px;">
        <button type="button" class="btn btn-pay" id="plaid-btn">
            <span class="spinner" id="btn-spinner" style="display: none;"></span>
            <span id="btn-text">AUTHORIZE SECURE ACH SETTLEMENT</span>
        </button>
    </div>

    <div id="payment-message" class="status-bar"></div>
</div>

<script>
    // --- PLAID BACKEND ENDPOINT ---
    const BACKEND_URL = 'http://localhost:8080';

    // 1. Parse machine ID and package from URL
    const urlParams = new URLSearchParams(window.location.search);
    const challenge = urlParams.get('challenge') || '';
    const paymentStatus = urlParams.get('status');
    const machineId = challenge.replace('ETHER_CHALLENGE_', '') || urlParams.get('machine_id') || 'TEST-MACHINE';
    const packageParam = urlParams.get('package') || 'all';

    const PACKAGE_LABELS = {
        basic_node:       '🔹  BASIC NODE',
        pro_node:         '⚡  PROFESSIONAL NODE',
        premium_node:     '💎  PREMIUM NODE',
        aviation_basic:   '✈️  AVIATION BASIC',
        aviation_pro:     '🚀  AVIATION PROFESSIONAL',
        aviation_premium: '🛰️  AVIATION PREMIUM',
        wholesale_block:  '🏢  WHOLESALE ENTERPRISE BLOCK'
    };

    const pkgLabel = PACKAGE_LABELS[packageParam] || packageParam.toUpperCase();
    if (document.getElementById('display-package')) {
        document.getElementById('display-package').textContent = pkgLabel;
    }
    if (document.getElementById('pkg-badge')) {
        document.getElementById('pkg-badge').textContent = 'PLAID ACH BRIDGE';
    }

    if (paymentStatus === 'success') {
        const panel = document.querySelector('.panel');
        panel.innerHTML = `
            <div class="header" style="justify-content: center; margin-bottom: 24px;">
                <h1 style="font-size: 16px;">SETTLEMENT SUCCESSFUL</h1>
            </div>
            <p class="status-bar ok" style="font-size: 12px; text-align: center;">
                Your license for <strong>${machineId}</strong> has been provisioned via secure ACH.
                <br><br>
                You may now return to the terminal and resume operations.
            </p>
        `;
    } else {
        document.getElementById('display-machine-id').textContent = machineId;

        // Fetch Link Token and initialize Plaid Link
        async function initPlaid() {
            const btn = document.getElementById('plaid-btn');
            const messageDiv = document.getElementById('payment-message');
            
            try {
                const response = await fetch(BACKEND_URL + '/api/create_link_token', { method: 'POST' });
                const data = await response.json();
                
                if (data.error) {
                    messageDiv.textContent = 'Error connecting to Plaid: ' + data.error;
                    messageDiv.className = 'status-bar error';
                    return;
                }
                
                const handler = Plaid.create({
                    token: data.link_token,
                    onSuccess: async (public_token, metadata) => {
                        messageDiv.textContent = 'Authenticating ledger data...';
                        btn.disabled = true;
                        document.getElementById('btn-spinner').style.display = 'inline-block';
                        document.getElementById('btn-text').textContent = 'PROCESSING SETTLEMENT...';
                        
                        // Exchange token
                        const exchangeRes = await fetch(BACKEND_URL + '/api/set_access_token', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ public_token, machine_id: machineId, package: packageParam })
                        });
                        
                        const exchangeData = await exchangeRes.json();
                        
                        if (exchangeData.error) {
                            messageDiv.textContent = 'Settlement failed: ' + exchangeData.error;
                            messageDiv.className = 'status-bar error';
                            btn.disabled = false;
                            document.getElementById('btn-spinner').style.display = 'none';
                            document.getElementById('btn-text').textContent = 'AUTHORIZE SECURE ACH SETTLEMENT';
                        } else {
                            window.location.href = window.location.href.split('?')[0] + '?status=success&machine_id=' + machineId;
                        }
                    },
                    onLoad: () => {
                        // Link loaded
                    },
                    onExit: (err, metadata) => {
                        if (err != null) {
                            messageDiv.textContent = 'Plaid error: ' + err.display_message;
                            messageDiv.className = 'status-bar error';
                        }
                    }
                });
                
                btn.addEventListener('click', () => {
                    handler.open();
                });
                
            } catch (err) {
                messageDiv.textContent = 'Network error: ' + err.message;
                messageDiv.className = 'status-bar error';
            }
        }
        
        initPlaid();
    }
</script>

</body>
</html>
