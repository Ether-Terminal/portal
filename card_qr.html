<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ether OS — Business Card QR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: #060608;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
            padding: 40px 20px;
        }

        .logo-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-mark {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #10b981, #06b6d4);
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 800;
            color: #000;
        }

        .logo-name {
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 0.28em;
            color: #10b981;
        }

        .title {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #64748b;
            text-align: center;
        }

        .qr-outer {
            background: #fff;
            border-radius: 14px;
            padding: 16px;
            box-shadow:
                0 0 0 1px rgba(16,185,129,0.2),
                0 0 40px rgba(16,185,129,0.12),
                0 20px 60px rgba(0,0,0,0.7);
        }

        #master-qr canvas,
        #master-qr img {
            display: block;
        }

        .label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.18em;
            color: #10b981;
            text-align: center;
            text-transform: uppercase;
        }

        .sublabel {
            font-size: 8px;
            color: #475569;
            letter-spacing: 0.1em;
            text-align: center;
        }

        .url-line {
            font-size: 8px;
            color: #334155;
            letter-spacing: 0.06em;
            text-align: center;
            max-width: 320px;
            word-break: break-all;
            line-height: 1.6;
        }

        .divider {
            width: 1px;
            height: 1px;
        }
    </style>
</head>
<body>

    <div class="logo-row">
        <div class="logo-mark">E</div>
        <span class="logo-name">ETHER OS</span>
    </div>

    <div class="title">Business Card QR Code</div>

    <div class="qr-outer">
        <div id="master-qr"></div>
    </div>

    <div class="label">Scan to See All Coverage Plans</div>
    <div class="sublabel">Ether Terminal LLC</div>
    <div class="url-line" id="url-display"></div>

<script>
    // ── This URL must be your network/deployed URL — not a file:// path ──
    const PORTAL_URL = 'https://ether-terminal.github.io/portal/portal.html';

    document.getElementById('url-display').textContent = PORTAL_URL;

    new QRCode(document.getElementById('master-qr'), {
        text: PORTAL_URL,
        width: 220,
        height: 220,
        colorDark: '#000000',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H
    });
</script>

</body>
</html>
